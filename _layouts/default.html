<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="chrome=1" />
  <meta name="description" content="Warmhug.github.com" />
  <meta name="keywords" content="Web JavaScript css html" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-touch-fullscreen" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/layout.css">
  <script src="https://gw.alipayobjects.com/os/rmsportal/ohuCPrbifXkbfMvLhbVb.js"></script>
  <style>
    .wrapper {
      width: 768px;
      margin: 50px auto;
      box-shadow: rgba(255, 255, 255, 0.2) 0 0 0 1px, rgba(0, 0, 0, 0.45) 0 1px 3px;
      background: #fff;
    }
    @media print, screen and (max-width: 740px) {
      .wrapper {
        width: 100%;
        margin: 0 auto;
        box-shadow: none;
      }
    }
    .header, .wrapper-main, footer {
      display: block;
      padding: 15px 20px;
    }
    .header {
      position: relative;
      border: 1px solid #dbe4e8;
    }
    .header h1 {
      margin: 0; text-shadow: rgba(255, 255, 255, 0.9) 0 1px 0;
    }
    .header p {
      margin: 0; color: #61778B; font-size: 12px;
    }
    .header .title { color: #7d94a9; }
    .header .github {
      position: absolute; z-index: 1; right: 20px; top: 20px; font-size: 12px;
    }
    .wrapper-main {
      position: relative;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1><a class="title" href="/">warmhug</a></h1>
      <p>技术成长、工作感悟、教训反思</p>
      <a class="github" href="https://github.com/warmhug">View On GitHub</a>
    </div>
    <div class="wrapper-main">{{ content }}</div>
    <footer>
      Project maintained by <a href="https://github.com/warmhug">warmhug</a>.<br>
      Hosted on GitHub Pages &mdash; Theme by <a href="https://github.com/orderedlist">orderedlist</a>
    </footer>
  </div>
  <!--[if !IE]><script>fixScale(document);</script><![endif]-->
</body>
</html>
