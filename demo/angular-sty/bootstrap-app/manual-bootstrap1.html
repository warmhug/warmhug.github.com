<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>manual-bootstrap</title>
    <script src="http://cdn.staticfile.org/angular.js/1.2.16/angular.min.js"></script>
</head>
<body>
    <!-- vm file1 -->
    <div id="b1" ng-controller="Ctrl">
        {{ c }}
        <!-- vm file2 -->
        <div id="in1" ng-controller="innerCtrl">
            {{ in }}
        </div>
    </div>

    <!-- 业务script -->
    <script>
        var app = angular.module('app', []);
        app.controller('Ctrl', ['$scope', function ($scope) {
            $scope.c = 'co';
        }]);
        angular.element(document).ready(function () {
            //angular.bootstrap(document, ['app']);
            angular.bootstrap(document.getElementById('b1'), ['app']);
        });
    </script>
    <script>
        //id="in1"的父元素 已经被当做ng-app启动。
        angular.module('appIn', []).controller('innerCtrl', ['$scope', function ($scope) {
            $scope.in = 'inner';
        }])
        angular.element(document).ready(function () {
            //由于父元素已启动，此处再次启动，会有问题
            //angular.bootstrap(document.getElementById('in1'), ['appIn']);
        })
    </script>
</body>
</html>
