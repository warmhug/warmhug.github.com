<!doctype html>
<html ng-app="app">
<head>
    <meta charset="utf-8" />
    <title>ng-app1</title>
    <script src="http://cdn.staticfile.org/angular.js/1.2.16/angular.min.js"></script>
    <script>
        (function (angular) {
            //给原来的angular.module方法记录添加状态
            //from  http://www.hiddentao.com/archives/2013/11/04/an-improved-angular-module-split-your-modules-into-multiple-files/
            var origMethod = angular.module;
            var alreadyRegistered = {};
            angular.module = function (name, reqs, configFn) {
                reqs = reqs || [];
                var module = null;
                if (alreadyRegistered[name]) {
                    module = origMethod(name);
                    /**
                     *   modify，添加去重
                     * */
                    // module.requires.push.apply(module.requires, reqs);

                    if(!angular.isArray(reqs)) return;
                    for (var i = 0; i < reqs.length; i++) {
                        var obj = reqs[i];
                        if(module.requires.indexOf(obj) < 0){ //去除重复的依赖
                            module.requires.push.apply(module.requires, reqs);
                        }
                    }

                } else {
                    module = origMethod(name, reqs, configFn);
                    alreadyRegistered[name] = module;
                }
                return module;
            };
        })(angular);
    </script>
</head>
<body>
    <!-- vm file 1 -->
    <div ng-controller="Ctrl">{{ data }}</div>
    <script>
        angular.module('module1', []).factory('dataStore', function () {
            return 'jack1';
        });
        var app = angular.module('app', ['module1']);
        app.controller('Ctrl', ['$scope', 'dataStore', function (scope, dataStore) {
            scope.data = dataStore;
        }])
    </script>

    <!-- vm file 2 -->
    <div ng-controller="Ctrl2"> {{ data }} </div>
    <script>
        angular.module('module2', []).factory('dataStore', function () {
            return 'jack2';
        });
        var app = angular.module('app', ['module2']); //看起来能再次启动app，添加依赖
        app.controller('Ctrl2', ['$scope', 'dataStore', function (scope, dataStore) {
            scope.data = dataStore;
        }])
    </script>
</body>
</html>
