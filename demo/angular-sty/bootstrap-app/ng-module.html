<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>ng-module</title>
    <script src="http://cdn.staticfile.org/angular.js/1.2.16/angular.js"></script>
    <!-- 引入ng-modules
     来自：http://www.simplygoodcode.com/2014/04/angularjs-getting-around-ngapp-limitations-with-ngmodule/
        用ng-module替代ng-app，以此解决掉ng-app只能有一个的限制，
        然后再用angular.bootstrap()手动启动应用。
     -->
    <script>
        (function() {
          function initNgModules(element) {
              var elements = [element],
                  moduleElements = [],
                  modules = [],
                  names = ['ng:module', 'ng-module', 'x-ng-module', 'data-ng-module', 'ng:modules', 'ng-modules', 'x-ng-modules', 'data-ng-modules'],
                  NG_MODULE_CLASS_REGEXP = /\sng[:\-]module[s](:\s*([\w\d_]+);?)?\s/;
              function append(element) {
                  element && elements.push(element);
              }
              for(var i = 0; i < names.length; i++) {
                  var name = names[i];
                  names[i] = true;
                  append(document.getElementById(name));
                  name = name.replace(':', '\\:');
                  if (element.querySelectorAll) {
                      var elements2;
                      elements2 = element.querySelectorAll('.' + name);
                      for(var j = 0; j < elements2.length; j++) append(elements2[j]);

                      elements2 = element.querySelectorAll('.' + name + '\\:');
                      for(var j = 0; j < elements2.length; j++) append(elements2[j]);

                      elements2 = element.querySelectorAll('[' + name + ']');
                      for(var j = 0; j < elements2.length; j++) append(elements2[j]);
                  }
              }
              for(var i = 0; i < elements.length; i++) {
                  var element = elements[i];
                  var className = ' ' + element.className + ' ';
                  var match = NG_MODULE_CLASS_REGEXP.exec(className);
                  if (match) {
                      moduleElements.push(element);
                      modules.push((match[2] || '').replace(/\s+/g, ','));
                  } else {
                      if(element.attributes) {
                          for (var attrName in element.attributes) {
                              if(attrName == "length") continue;
                              var attr = { name: attrName, value: element.attributes[attrName].nodeValue };

                              if (names[attr.name]) {
                                  moduleElements.push(element);
                                  modules.push(attr.value);
                              }
                          }
                      }
                  }
              }
              for(var i = 0; i < moduleElements.length; i++) {
                  var moduleElement = moduleElements[i];
                  var module = modules[i].replace(/ /g,'').split(",");
                  angular.bootstrap(moduleElement, module);
              }
          }
          angular.element(document).ready(function() {
                initNgModules(document);
          });
        })();
    </script>
</head>
<body>
    <div ng-modules="MyModuleA, MyModuleB">
        <h1>Module A, B</h1>
        <div ng-controller="MyControllerA">
            {{name}}
        </div>
        <div ng-controller="MyControllerB">
            {{name}}
        </div>
    </div>
    <div ng-module="MyModuleB">
        <h1>Just Module B</h1>
        <div ng-controller="MyControllerB">
            {{name}}
        </div>
        <!-- 把MyModuleC 内嵌到MyModuleB中 -->
        <h1>MyModuleC 内嵌到MyModuleB中，可以吗？不可以</h1>
        <!--<div ng-module="MyModuleC">-->
            <!--<div ng-controller="MyControllerC"> {{ name }} </div>-->
        <!--</div>-->
    </div>
    <script>
        var moduleA = angular.module("MyModuleA", []);
        moduleA.controller("MyControllerA", function ($scope) {
            $scope.name = "Bob A";
        });

        var moduleB = angular.module("MyModuleB", []);
        moduleB.controller("MyControllerB", function ($scope) {
            $scope.name = "Steve B";
        });

        var moduleC = angular.module("MyModuleC", []);
        moduleC.controller("MyControllerC", function ($scope) {
            $scope.name = "Steve C";
        });
    </script>
</body>
</html>
