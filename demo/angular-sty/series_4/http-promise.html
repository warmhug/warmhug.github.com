<!doctype html>
<html ng-app="app">
<head>
    <script src="../lib/jquery-1.9.1.js"></script>
	<script src="../lib/angular.js"></script>
</head>
<body ng-controller="mainCtrl">

    <div class="timeout">
        <h3 ng-hide="user">Not yet loaded</h3>            
        {{user}}
        <h4>{{user_http}}</h4>
    </div>
    <script>
        var app = angular.module('app', []);

        //timeout异步
        app.factory('user', ['$timeout', '$q', function ($timeout, $q) {
            return {
                value: $timeout(function () { //Simulate a request
                    return {
                        name: "Jossi"
                    };
                }, 1000)
            };
        }]);
        //http
        app.factory('user_http', ['$http', function ($http) {
            function success(data, status, headers, config) {
                console.log(data);
            }
            function error(data, status, headers, config) {
                console.log(data);
            }
            //返回一个promise对象
            return $http.get('./json/user.json').success(success).error(error);
        }]);

        app.controller('mainCtrl', ['$scope', 'user', 'user_http', function ($scope, user, user_http) {
            $scope.user = user.value;
            $scope.user_http = user_http;

            user_http.then(function (data) {
                console.log(data)
            })

            // want to do stuff when loaded?
            user.value.then(function (data) {
                console.log(data)
            }, function (error) {
                // handle loading error
            });

        }])
    </script>



    <script>
        /*

            手动bootstrap时，要 移除html中的 ng-app 标记

</body>
</html>
