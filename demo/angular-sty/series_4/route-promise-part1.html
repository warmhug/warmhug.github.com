<!doctype html>
<html ng-app="plunker">
<head>
	<script src="../lib/angular.js"></script>
</head>
<body ng-view>
    
    <script>

        /*
            from：http://plnkr.co/edit/GKg21XH0RwCMEQGUdZKH?p=preview

            参考api: 
                http://code.angularjs.org/1.0.7/docs/api/ng.$route
                http://code.angularjs.org/1.0.7/docs/api/ng.$routeProvider  

            把$routeProvider.when中的resolve项注释掉，
            再对比下app.controller中的console.log值，看看有什么不一样？
        */


        var app = angular.module('plunker', []);

        app.config(function ($routeProvider) {
            $routeProvider
              .when('/', {
                  controller: 'MainCtrl',
                  template: '<div>From MyService:<pre>{{data | json}}</pre></div>',
                  resolve: {
                      'MyServiceData': function (MyService) {
                          return MyService.promise;
                      }
                  }
              })
        })

        app.controller('MainCtrl', function ($scope, MyService, MyServiceData) {
            console.log('Promise is now resolved: ' + MyService.doStuff())
            $scope.data = MyService.doStuff();
        });

        app.service('MyService', function ($http) {
            var myData = null;

            var promise = $http.get('./json/user.json').success(function (data) {
                myData = data;
            });

            return {
                promise: promise,
                setData: function (data) {
                    myData = data;
                },
                doStuff: function () {
                    return myData;
                }
            };
        });





    </script>
</body>
</html>
