<!doctype html>
<html ng-app="app">
<head>
    <meta charset="utf-8" />
    <title>dom-ready</title>
    <script src="http://cdn.staticfile.org/jquery/1.11.1/jquery.min.js"></script>
    <script src="http://cdn.staticfile.org/angular.js/1.2.16/angular.min.js"></script>
    <style>
        .spe{
            width: 100px;
            border: 1px solid red;
        }
    </style>
</head>
<body>
    <div ng-controller="Ctrl" xx-yy>
        <p class="list" ng-repeat="item in items" ng-class="{spe: $index==2}">{{item}}</p>
    </div>

    <script>
        var app = angular.module('app', []);
        app.controller('Ctrl', ['$scope', function ($scope) {
            $scope.items = [1,2,3,4,5];
        }]);
        app.directive('xxYy', ['$timeout', function ($timeout) {
            return {
                link: function (scope, element, attrs) {
                    console.log(element.find('.list').length);
                    $timeout(function () {
                        console.log(element.find('.list').length);
                        element.find('.list').each(function () {
                            console.log(angular.element(this).width())
                        })
                    })
                }
            };
        }]);
    </script>
</body>
</html>
