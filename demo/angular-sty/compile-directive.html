<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>compile</title>
    <script src="http://cdn.staticfile.org/angular.js/1.2.16/angular.min.js"></script>
</head>
<body ng-app="app" ng-controller="main">
    <div ng-bind-html="tpl | trusted"></div>
    <div compile="tpl"></div>
    <script>
        var app = angular.module('app', ['compile']);
        app.controller('main', [
            '$scope', function ($scope) {
                $scope.tpl = '<p ng-click="say()" style="color:red">click me</p>';
                $scope.say = function () {
                    alert('hello')
                };
            }
        ]);
        app.filter('trusted', ['$sce', function($sce){
            return function (text) {
                return $sce.trustAsHtml(text);
            };
        }]);

        //from https://github.com/angular/angular.js/issues/4992
        /**
         *  ng-bind-html should not call $compile.
         *  If you want this behavior (which is almost certainly a security issue),
         *  then you'll have to use your own directive.
         *  翻译：
         *  ng-bind-html不会调用$compile服务，所以不会处理ng-click这些directive。
         *  你需要自己写directive去处理这种情况。
         */
        angular.module('compile', []).directive('compile', function ($compile) {
            // directive factory creates a link function
            return function (scope, element, attrs) {
                scope.$watch(function (scope) {
                        // watch the 'compile' expression for changes
                        return scope.$eval(attrs.compile);
                    }, function (value) {
                        // when the 'compile' expression changes
                        // assign it into the current DOM
                        element.html(value);

                        // compile the new DOM and link it to the current
                        // scope.
                        // NOTE: we only compile .childNodes so that
                        // we don't get into infinite loop compiling ourselves
                        $compile(element.contents())(scope);
                    });
            };
        });
    </script>
</body>
</html>
